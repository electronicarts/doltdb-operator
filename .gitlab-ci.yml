# GitLab CI yaml reference: https://docs.gitlab.com/ee/ci/yaml/index.html

variables:
  # Tooling versions for CI builds.
  # These versions should be driven down through all Makefiles, scripts, and Dockerfiles.
  HELM_VERSION: '3.16.2'
  GOLANG_VERSION: '1.23.2'
  KUBECTL_VERSION: '1.30.2'
  # TODO(asnyder): Update version once https://github.com/norwoodj/helm-docs/pull/112 is merged/released.
  HELM_DOCS_VERSION: 'v1.14.2'
  CONFTEST_VERSION: '0.26.0'
  CHART_TESTING_VERSION: '3.4.0'
  GOLANGCI_LINT_VERSION: '1.59.1'
  # Other variables.
  DOCKER_HUB_PROXY: docker.io
  DOCKER_VERSION: 27
  LOCALHOST_DOCKER_ADDRESS: docker
  HELM_PROJECT: "REDACTED" # This is the project name in Harbor for REDACTED TODO: Find out generic place.
  PROJECT_NUM: "135"
  HARBOR_REGISTRY: "REDACTED"
default:
  tags:
    - glaas-shared-k8s-dind

# Workflow reference: https://docs.gitlab.com/ee/ci/yaml/index.html#workflow
workflow:
  # Rules that determine whether or not a pipeline is created.
  # Rules based on: https://docs.gitlab.com/ee/ci/yaml/index.html#switch-between-branch-pipelines-and-merge-request-pipelines
  rules:
    # Prevent duplicate pipelines if there is an open merge request.
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"
      when: never
    # For deploy pipelines, define the release variables.
    - if: $CI_COMMIT_TAG
      variables:
        RELEASE_VERSION: $CI_COMMIT_TAG
        RELEASE_CHANNEL: stable
    # Match remaining pipeline types.
    - when: always
      variables:
        # The v0.0.0 prefix is to create a valid semver that GitLab Helm registry recognizes.
        RELEASE_VERSION: v0.0.0-${CI_PIPELINE_ID}
        RELEASE_CHANNEL: edge

## SUB PROJECT TEST JOBS ##

# Since this project is structured as a monorepo, each sub-project directory defines its own jobs
# which are triggered as child-pipelines.
#
# Trigger reference: https://docs.gitlab.com/ee/ci/yaml/index.html#trigger
# Rules reference: https://docs.gitlab.com/ee/ci/yaml/index.html#rules

charts:test:
  trigger:
    include:
      - local: charts/.gitlab-ci.yml
    strategy: depend
  rules:
    # In merge requests pipelines, only trigger the sub-project tests if there are code changes.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - 'charts/**/*'
    # Trigger the tests for all other pipeline types.
    - if: $CI_PIPELINE_SOURCE != "merge_request_event"


## ROOT TEST JOBS ##
.dind-service:
  services:
    - name: $DOCKER_HUB_PROXY/docker:$DOCKER_VERSION-dind
      alias: docker
  tags:
    # Run on Kubernetes (currently in alpha)
    # See: https://REDACTED
    - glaas-shared-k8s-dind
  retry: 2 # The DinD runners frequently run into errors.

.dind:
  extends: .dind-service
  image: $DOCKER_HUB_PROXY/docker:$DOCKER_VERSION


empty:test:
  image: ${DOCKER_HUB_PROXY}/alpine
  script: echo "Creating an empty job for no code changes (needed for gitlab pipeline to succeed in merge requests)"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - 'api/*'
        - 'cmd/*'
        - 'internal/*'
        - 'api/*'
        - 'pkg/*'
        - 'charts/**/*'
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

.chart:deploy:
  stage: deploy
  extends:
    - .dind
  before_script:
    - apk add -q make
  script:
    - echo "Release Version=$RELEASE_VERSION, Release Channel=$RELEASE_CHANNEL, Branch=$CI_COMMIT_BRANCH, Protected=$CI_COMMIT_REF_PROTECTED"
    - cd charts
    # Template-in the release variables for the operator image.
    - sed -i
      -e "s|%%image_tag%%|${RELEASE_VERSION}|g"
      -e "s|%%image_repository%%|${HARBOR_REGISTRY}/${HELM_PROJECT}/dolt-operator|g"
      ./dolt-operator/values.yaml
    # Re-run the README generation for the new values.
    - make generate-docs
    # Package the chart.
    - docker run --rm -v "$(pwd):/project" -w /project ${DOCKER_HUB_PROXY}/alpine/helm:${HELM_VERSION}
      package dolt-operator --version $RELEASE_VERSION
    # Upload the chart to the GitLab Helm package registry.
    - apk add -q curl




.image:deploy:
  stage: deploy
  extends:
    - .dind
  script:
    - echo "Release Version=$RELEASE_VERSION, Release Channel=$RELEASE_CHANNEL, Branch=$CI_COMMIT_BRANCH, Protected=$CI_COMMIT_REF_PROTECTED"
    - REPOSITORY=${HARBOR_REGISTRY}/${HELM_PROJECT}/dolt-operator
    - echo "$HARBOR_PASSWORD" | docker login ${HARBOR_REGISTRY} -u "$HARBOR_USERNAME" --password-stdin
    - docker build -t $REPOSITORY:$RELEASE_VERSION -t $REPOSITORY:latest --build-arg GOLANG_VERSION --build-arg DOCKER_HUB_PROXY .
    - docker push ${HARBOR_REGISTRY}/${HELM_PROJECT}/dolt-operator:$RELEASE_VERSION
    - docker push ${HARBOR_REGISTRY}/${HELM_PROJECT}/dolt-operator:latest

.deploy:manual:
  rules:
    - if: $CI_COMMIT_REF_PROTECTED != "true" && ($CI_COMMIT_BRANCH == null || $CI_COMMIT_TAG == null)
      when: manual
  allow_failure: true


# Only run when branch is protected and the project is not a fork and only on branches or tags (not merge requests)
image:deploy:
  extends:
    - .image:deploy
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "true" && $CI_PROJECT_NAMESPACE == "stellar" && ($CI_COMMIT_BRANCH || $CI_COMMIT_TAG)


# Only run when branch is non-protected and the project is not a fork and only on branches (not merge requests)
image:deploy:manual:
  extends:
    - .image:deploy
    - .deploy:manual

# Only run when branch is non-protected and the project is not a fork and only on branches (not merge requests)
chart:deploy:manual:
  extends:
    - .chart-release
    - .deploy:manual

# Only run when branch is protected and the project is not a fork and only on branches or tags (not merge requests)
chart:deploy:
  extends:
    - .chart-release
  needs:
    # Since we template-in the image tag, make sure the image was able to be pushed first.
    - image:deploy
  rules:
    - if: $CI_COMMIT_REF_PROTECTED == "true"  && ($CI_COMMIT_BRANCH || $CI_COMMIT_TAG)

.chart-release:
  stage: deploy
  image: docker.io/alpine/helm:3.8.2
  script:
    - echo "Release Version=$RELEASE_VERSION, Release Channel=$RELEASE_CHANNEL, Branch=$CI_COMMIT_BRANCH, Protected=$CI_COMMIT_REF_PROTECTED"
    - apk add --no-cache git bash
    - helm plugin install https://github.com/chartmuseum/helm-push
    - echo "$HARBOR_PASSWORD" | helm repo add ${HELM_PROJECT} https://${HARBOR_REGISTRY}/chartrepo/${HELM_PROJECT} --username "$HARBOR_USERNAME" --password-stdin
    - cd charts
    - helm package dolt-operator --version $RELEASE_VERSION
    - helm cm-push dolt-operator-${RELEASE_VERSION}.tgz ${HELM_PROJECT}
  before_script:
    - echo "Running the release job."

operator:test:
  trigger:
    include:
      - local: .gitlab-operator-ci.yml
    strategy: depend
  rules:
    # In merge requests pipelines, only trigger the sub-project tests if there are code changes.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - 'api/*'
        - 'cmd/*'
        - 'internal/*'
        - 'api/*'
        - 'pkg/*'
    # Trigger the tests for all other pipeline types.
    - if: $CI_PIPELINE_SOURCE != "merge_request_event"