# permissions for end users to view doltdbs.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: dolt-operator
    app.kubernetes.io/managed-by: kustomize
  name: doltdb-viewer-role
rules:
- apiGroups:
  - k8s.dolthub.com
  resources:
  - doltdbs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - k8s.dolthub.com
  resources:
  - doltdbs/status
  verbs:
  - get
