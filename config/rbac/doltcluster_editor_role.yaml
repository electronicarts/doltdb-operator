# permissions for end users to edit doltclusters.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: dolt-operator
    app.kubernetes.io/managed-by: kustomize
  name: doltcluster-editor-role
rules:
- apiGroups:
  - k8s.dolthub.com
  resources:
  - doltclusters
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - k8s.dolthub.com
  resources:
  - doltclusters/status
  verbs:
  - get
