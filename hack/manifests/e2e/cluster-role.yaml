apiVersion: v1
kind: ServiceAccount
metadata:
  name: dolt-operator-test-runner-sa
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: dolt-operator-test-runner-clusterrole
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: dolt-operator-test-runner-clusterrolebinding
subjects:
  - kind: ServiceAccount
    name: dolt-operator-test-runner-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: dolt-operator-test-runner-clusterrole
  apiGroup: rbac.authorization.k8s.io
