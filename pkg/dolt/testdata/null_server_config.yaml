test-cluster-0.yaml:
  log_level: trace
  cluster:
    bootstrap_epoch: 1
    bootstrap_role: primary
    standby_remotes:
      - name: test-cluster-1
        remote_url_template: http://test-cluster-1.test-cluster-internal.default:50051/{database}
    remotesapi:
      port: 50051
  listener:
    host: 0.0.0.0
    max_connections: 128
    port: 3306
  metrics:
    host: 0.0.0.0
    labels:
      doltdb_instance: doltdb-dev 
    port: 9092
