apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "dolt-operator.fullname" . }}-leader-election
  namespace: {{ .Values.leaderElection.namespace | default .Release.Namespace }}
  labels:
    {{- include "dolt-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Values.leaderElection.existingRole | default (printf "%s-leader-election" (include "dolt-operator.fullname" .)) }}
subjects:
- kind: ServiceAccount
  name: {{ include "dolt-operator.serviceAccountName" . }}
  namespace: {{ .Release.Namespace }}
