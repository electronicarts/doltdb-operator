apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dolt-operator.fullname" . }}
  labels:
    {{- include "dolt-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "dolt-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "dolt-operator.deploymentAnnotations" . | nindent 8 }}
      labels:
        {{- include "dolt-operator.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "dolt-operator.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | required "image.tag is required" }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
          {{- range .Values.containerArgs }}
          - {{ . }}
          {{- end }}
          {{- if .Values.leaderElection.id }}
          - --leader-election-id={{ .Values.leaderElection.id }}
          {{- end }}
          {{- if .Values.leaderElection.namespace }}
          - --leader-election-namespace={{ .Values.leaderElection.namespace }}
          {{- end }}
          env:
            - name: DOLT_OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          securityContext:
            allowPrivilegeEscalation: false
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
