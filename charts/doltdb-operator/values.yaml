# Default values for doltdb-operator.

replicas: 1

image:
  repository: ghcr.io/electronicarts/doltdb-operator
  pullPolicy: IfNotPresent
  tag: ""  # Defaults to chart appVersion

containerArgs:
  - --leader-elect

# Leader election configuration for multi-instance deployments
leaderElection:
  # -- The ID used for leader election. Multiple operator instances with the same ID and namespace will coordinate.
  # IMPORTANT: For same-namespace deployments, all instances MUST use the same ID.
  id: "k8s.dolthub.com"
  # -- The namespace where the leader election ConfigMap will be created.
  # If empty, uses the operator's namespace.
  # For multi-instance deployments in the same namespace, leave this empty.
  # For multi-instance deployments across different namespaces, set to a shared namespace.
  namespace: ""
  # -- Whether to create the leader election Role. Set to false for secondary installations.
  createRole: true
  # -- Name of existing leader election role to use. If not set, defaults to <fullname>-leader-election.
  existingRole: ""

deploymentAnnotations:
  sidecar.istio.io/inject: "false"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# -- A boolean flag indicating whether CRDs should be installed.
# Set to false when using the standalone doltdb-operator-crds chart. Default: false.
installCrds: false

# -- A boolean flag indicating whether CRDS should be kept or deleted when uninstalled with helm. Default: true.
keepCrds: true

# -- A boolean flag indicating whether ClusterRole and ClusterRoleBinding should be installed. Set to false for secondary installations. Default: true.
installClusterRole: true

# -- Name of an existing ClusterRole to use when installClusterRole is false. If not set, defaults to the fullname.
existingClusterRole: ""
