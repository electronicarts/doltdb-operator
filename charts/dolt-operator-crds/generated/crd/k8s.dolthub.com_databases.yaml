---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.16.1
  name: databases.k8s.dolthub.com
spec:
  group: k8s.dolthub.com
  names:
    kind: Database
    listKind: DatabaseList
    plural: databases
    singular: database
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].message
      name: Status
      type: string
    - jsonPath: .spec.characterSet
      name: CharSet
      type: string
    - jsonPath: .spec.collate
      name: Collate
      type: string
    - jsonPath: .spec.doltDBRef.name
      name: DoltDB
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - jsonPath: .spec.name
      name: Name
      type: string
    name: v1alpha
    schema:
      openAPIV3Schema:
        description: Database is the Schema for the Dolt Database API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: DatabaseSpec defines the desired state of Database
            properties:
              charset:
                default: utf8mb4
                description: Chartset is the charset of the DoltDB database, executed
                  as CREATE DATABASE <name> CHARACTER SET <charset>
                type: string
              cleanupPolicy:
                description: CleanupPolicy defines the behavior for cleaning up a
                  SQL resource.
                enum:
                - Skip
                - Delete
                type: string
              collation:
                default: utf8mb4_0900_bin
                description: |-
                  Collation is the collation of the DoltDB database, executed as CREATE DATABASE <name> COLLATE <collation>
                  doltdb's default collation: https://docs.dolthub.com/sql-reference/sql-support/collations-and-charsets
                type: string
              doltDBRef:
                description: DoltDBRef is a reference to a DoltDB object.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                type: object
              doltIgnorePatterns:
                description: |-
                  DoltIgnorePatterns is the list of tables to ignore in the DoltDB database
                  Reference: https://www.dolthub.com/blog/2023-05-03-using-dolt_ignore-to-prevent-accidents/
                items:
                  type: string
                type: array
              name:
                description: Name is the name of the DoltDB database, executed as
                  CREATE DATABASE <name>
                maxLength: 80
                pattern: ^[a-zA-Z0-9_]+$
                type: string
              requeueInterval:
                description: RequeueInterval is used to perform requeue reconciliations.
                type: string
              retryInterval:
                description: RetryInterval is the interval used to perform retries.
                type: string
              systemBranches:
                description: SystemBranches is the list of system branches to create
                  in the DoltDB database (e.g master, global)
                items:
                  type: string
                type: array
            required:
            - doltDBRef
            - name
            type: object
          status:
            description: DatabaseStatus defines the observed state of Database
            properties:
              conditions:
                description: Conditions for the Database object.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
